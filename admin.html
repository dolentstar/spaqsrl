<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SPAQ Admin - Gestione Corsi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">SPAQ <span style="color: var(--text-gray); font-size: 1.2rem;">Console</span></div>
        <nav><a href="index.html">Torna al Sito Pubblico</a></nav>
    </header>

    <div class="admin-grid">
        <div class="admin-panel">
            <h2 style="margin-bottom: 2rem; color: var(--primary);">➕ Nuovo Corso</h2>
            <form id="addCorsoForm">
                <div class="form-group">
                    <label>Titolo del Corso</label>
                    <input type="text" id="titolo" required placeholder="Es. Primo Soccorso">
                </div>
                <div class="form-group">
                    <label>Aula / Sede</label>
                    <input type="text" id="aula" required placeholder="Es. Milano">
                </div>
                <div class="form-group">
                    <label>Data del Corso</label>
                    <input type="date" id="data" required>
                </div>
                <div class="form-group">
                    <label>Descrizione / Programma</label>
                    <textarea id="desc" rows="4" required></textarea>
                </div>
                <button type="submit">Pubblica</button>
            </form>
        </div>

        <div class="admin-panel">
            <h2 style="margin-bottom: 2rem; color: var(--primary);">📋 Corsi Attivi</h2>
            <div id="lista-corsi-admin">
                <p>Caricamento in corso...</p>
            </div>
        </div>
    </div>

    <script>
        // Funzione per ricaricare la lista dei corsi nell'admin
        function loadAdminCorsi() {
            fetch('/cgi-bin/backend')
                .then(res => res.json())
                .then(corsi => {
                    const lista = document.getElementById('lista-corsi-admin');
                    lista.innerHTML = '';
                    if(corsi.length === 0) {
                        lista.innerHTML = '<p>Nessun corso in vetrina.</p>';
                        return;
                    }
                    corsi.forEach(corso => {
                        lista.innerHTML += `
                            <div class="corso-admin-item">
                                <div>
                                    <strong>${corso.data}</strong> - ${corso.titolo}<br>
                                    <small>${corso.aula}</small>
                                </div>
                                <button class="btn-delete" onclick="eliminaCorso(${corso.id})">Elimina</button>
                            </div>
                        `;
                    });
                });
        }

        // Inserimento
        document.getElementById('addCorsoForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const payload = [
                document.getElementById('titolo').value,
                document.getElementById('aula').value,
                document.getElementById('data').value,
                document.getElementById('desc').value
            ].join('|');

            fetch('/cgi-bin/backend', { method: 'POST', body: payload })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    e.target.reset();
                    loadAdminCorsi(); // Ricarica la lista a destra
                }
            });
        });

        // Eliminazione (chiama il metodo DELETE del nostro C)
        window.eliminaCorso = function(id) {
            if(confirm('Sicuro di voler eliminare questo corso?')) {
                fetch(`/cgi-bin/backend?id=${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'success') loadAdminCorsi();
                });
            }
        };

        // Carica la lista all'avvio
        loadAdminCorsi();
    </script>
</body>
</html>
